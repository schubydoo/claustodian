name: OSV-Scanner

# Scan the committed package-lock.json against the OSV database (osv.dev) and
# upload SARIF to Security > Code scanning. Complements Dependabot: a broader
# advisory corpus, scanning the *resolved* lockfile rather than manifest ranges.
# Report-only for now (fail-on-vuln: false) so findings surface without blocking
# merges — flip to blocking once the signal is tuned. NOT wired into the
# `security required checks passed` aggregator (a separate workflow can't feed
# another's `needs:`), matching clauster: this is a signal job, not a gate.
#
# The OSV reusable workflow is SHA-PINNED (GitHub's own recommendation); Renovate
# tracks the pin via the trailing `# vX.Y.Z` comment.

on:
  pull_request:
    # Trimmed off the synchronize storm; this PR scan is report-only and overlaps
    # dependency-review on manifest CVEs. push:main + weekly cron are the real scan.
    types: [opened, reopened, ready_for_review]
  schedule:
    - cron: '27 5 * * 1' # weekly full scan, Monday 05:27 UTC
  push:
    branches: [main]
  workflow_dispatch:

# Default-deny at the workflow level; each job grants only what it needs.
permissions: {}

concurrency:
  group: osv-scanner-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Diff-aware scan on PRs: reports only the vulnerabilities the PR introduces.
  scan-pr:
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      fail-on-vuln: false # report-only signal for now; flip to blocking once tuned
    permissions:
      security-events: write # upload the SARIF to Security > Code scanning
      contents: read # checkout + read the lockfile
      actions: read # read run metadata for the SARIF upload

  # Full scan on a schedule, on pushes to main, and on manual dispatch. Run via
  # the pinned OSV-Scanner BINARY (not the reusable full-scan workflow, which
  # references a tag-pinned action internally that a require-SHA-pin policy
  # rejects at resolution time). The binary is pinned by version + verified by
  # sha256; the SARIF upload is SHA-pinned.
  scan-scheduled:
    name: full scan (pinned binary)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload the SARIF to Security > Code scanning
      contents: read # checkout + read the lockfile
      actions: read # codeql-action/upload-sarif reads run metadata
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install OSV-Scanner (pinned release, checksum-verified)
        env:
          GH_TOKEN: ${{ github.token }}
          # renovate: datasource=github-releases depName=google/osv-scanner
          OSV_VERSION: 'v2.3.8'
          # Bump together with OSV_VERSION: sha256 of osv-scanner_linux_amd64 from
          # the release's osv-scanner_SHA256SUMS. The sha256sum -c below fails the
          # job until this matches — a deliberate fail-loud, never a silent skip.
          OSV_SHA256: 'bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc'
        run: |
          set -euo pipefail
          gh release download "$OSV_VERSION" --repo google/osv-scanner \
            --pattern osv-scanner_linux_amd64 --output osv-scanner
          echo "${OSV_SHA256}  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
      - name: Scan committed lockfile (report-only)
        run: |
          set -euo pipefail
          set +e
          ./osv-scanner scan source -r --format sarif --output-file results.sarif .
          echo "OSV_EXIT=$?" >> "$GITHUB_ENV"
          exit 0 # never fail here — upload the SARIF first, then surface a real error below
      - name: Upload SARIF to code scanning
        if: ${{ hashFiles('results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: osv-scanner
      - name: Surface a real scanner error
        if: ${{ always() }}
        run: |
          # 0 = no vulns, 1 = vulns found (report-only). Anything else is a real
          # osv-scanner error: fail the job AFTER the SARIF upload above.
          if [ "${OSV_EXIT:-0}" -gt 1 ]; then
            echo "::error::osv-scanner failed (exit ${OSV_EXIT})"
            exit "${OSV_EXIT}"
          fi
