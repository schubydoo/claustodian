# Task 3.3 — CI gate on every PR. Blocks merge unless lint, typecheck, tests,
# and schema validation all pass. Least-privilege: read-only.
name: Validate PR

on:
  pull_request:
    paths:
      - 'data/**'
      - 'schema/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vitest.config.ts'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # Run tests with coverage: enforces the vitest threshold and produces
      # coverage/lcov.info for the Codecov upload below.
      - run: npm run test:coverage
      - run: npm run validate
      # Blocking: every symbol documented in the changelog must be present in
      # the dataset (the full backfill is committed, so this holds at 100%).
      - run: npm run coverage
      # Report coverage to Codecov (reads codecov.yml). Uploads even if an
      # earlier step failed so a coverage drop surfaces with the breakage.
      # Needs the CODECOV_TOKEN secret once the Codecov app is installed.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
