# Task 3.3 — CI gate on every PR. Blocks merge unless lint, typecheck, tests,
# and schema validation all pass. Least-privilege: read-only.
#
# Runs on EVERY pull request (no path filter): the `main` ruleset requires the
# `validate` context, and a required check that is skipped by a path filter never
# reports — leaving the PR stuck at "Expected". Docs/asset-only PRs still run the
# full gate (fast, and everything passes), which keeps the required check always
# satisfiable.
name: Validate PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      # Run tests with coverage: enforces the vitest threshold and produces
      # coverage/lcov.info for the Codecov upload below.
      - run: npm run test:coverage
      - run: npm run validate
      # Non-blocking drift signal. This compares the LIVE upstream CHANGELOG.md
      # against the committed dataset, so a new upstream release adds symbols the
      # committed data hasn't caught up on yet — which must not fail an unrelated
      # PR. Drift reconciliation is owned by the hourly check-new-release detector
      # + the update-from-changelog bot, where this same check runs as a BLOCKING
      # gate (the bot regenerates data/ in that run, so coverage must hold there).
      - name: Changelog coverage (informational)
        run: npm run coverage
        continue-on-error: true
      # Report coverage to Codecov (reads codecov.yml). Uploads even if an
      # earlier step failed so a coverage drop surfaces with the breakage.
      # Public repo → tokenless upload (no CODECOV_TOKEN secret). Unlike
      # coverage.yml, fail_ci_if_error stays false here on purpose: a flaky
      # Codecov upload must never block a PR merge — the vitest threshold is the
      # real gate, and patch coverage is a non-required signal.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
      # Upload JUnit results to Codecov Test Analytics (flaky/failed-test
      # tracking). Same codecov-action as the coverage upload above, just with
      # report_type: test_results — the standalone test-results-action isn't
      # needed (report_type was added to codecov-action in v5). `!cancelled()`
      # so failing tests still report — capturing the failure is the whole point.
      # Tokenless, and fail_ci_if_error stays false on PRs: a flaky upload must
      # not block a merge.
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./test-report.junit.xml
          report_type: test_results
          fail_ci_if_error: false
