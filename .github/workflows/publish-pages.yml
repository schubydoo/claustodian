# Task 3.2 — Publish /data to GitHub Pages on every push to the default branch.
# JSON is served as-is; YAML/TOML are generated in CI (they are gitignored and
# never committed). Deploy uses GitHub's OIDC-based deploy-pages (no stored
# credential). NOTE: assumes the default branch is `main` — change if the repo
# uses `master`. This workflow only runs once the repo is pushed to GitHub with
# Pages enabled (Settings -> Pages -> Source: GitHub Actions).
name: Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'schema/**'
      - 'site/**'
      - 'assets/logo/favicon.svg'
      - '.github/workflows/publish-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: Generate YAML/TOML exports
        run: npm run generate-exports
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r data _site/data
          if [ -f site/index.html ]; then cp site/index.html _site/index.html; fi
          # Favicon referenced by index.html as href="favicon.svg" (site root).
          if [ -f assets/logo/favicon.svg ]; then cp assets/logo/favicon.svg _site/favicon.svg; fi
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to GitHub Pages
      id-token: write # OIDC token for the deploy-pages action
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
