# Task 3.2 — Publish /data to GitHub Pages on every push to the default branch.
# JSON is served as-is; YAML/TOML are generated in CI (they are gitignored and
# never committed). Deploy uses GitHub's OIDC-based deploy-pages (no stored
# credential). NOTE: assumes the default branch is `main` — change if the repo
# uses `master`. This workflow only runs once the repo is pushed to GitHub with
# Pages enabled (Settings -> Pages -> Source: GitHub Actions).
name: Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'schema/**'
      - 'site/**'
      - 'assets/logo/favicon.svg'
      - 'llms.txt'
      - '.github/workflows/publish-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: Generate YAML/TOML exports
        run: npm run generate-exports
      # Cross-version catalog powering the site's "Search all versions" mode.
      # Written to data/catalog.json (gitignored) so the assemble step below picks
      # it up with the rest of data/.
      - name: Build cross-version catalog
        run: npm run build-catalog
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r data _site/data
          if [ -f site/index.html ]; then cp site/index.html _site/index.html; fi
          # Favicon referenced by index.html as href="favicon.svg" (site root).
          if [ -f assets/logo/favicon.svg ]; then cp assets/logo/favicon.svg _site/favicon.svg; fi
          # llms.txt at the site root so agents can fetch <pages-url>/llms.txt.
          if [ -f llms.txt ]; then cp llms.txt _site/llms.txt; fi
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to GitHub Pages
      id-token: write # OIDC token for the deploy-pages action
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
