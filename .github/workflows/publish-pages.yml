# Task 3.2 — Publish /data to GitHub Pages on every push to the default branch.
# JSON is served as-is; YAML/TOML are generated in CI (they are gitignored and
# never committed). Deploy uses GitHub's OIDC-based deploy-pages (no stored
# credential). NOTE: assumes the default branch is `main` — change if the repo
# uses `master`. This workflow only runs once the repo is pushed to GitHub with
# Pages enabled (Settings -> Pages -> Source: GitHub Actions).
name: Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'schema/**'
      - '.github/workflows/publish-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate
      - name: Generate YAML/TOML exports
        run: npm run generate-exports
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r data _site/data
          if [ -f site/index.html ]; then cp site/index.html _site/index.html; fi
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to GitHub Pages
      id-token: write # OIDC token for the deploy-pages action
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
