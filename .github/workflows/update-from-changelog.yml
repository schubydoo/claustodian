# Task 3.5 — Regenerate the dataset from the official CHANGELOG.md and open a
# PR with any changes. Changelog-sourced data is authoritative, so this PR is
# intended to be auto-mergeable once the validate-pr checks pass.
#
# NOTE: the FIRST run produces a large PR — the initial full backfill that
# replaces the curated seed with the complete changelog-derived dataset
# (~335 versions). Review that one carefully; subsequent runs are incremental
# (a new release adds one version file and updates index.json/latest.json).
name: Update dataset from changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Claude Code version to scrape the binary for (e.g. 2.1.214). Defaults to data/index.json latest.'
        required: false
        type: string
  repository_dispatch:
    types: [new-release]

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Mint a claustodian-ci App token so the PR is opened by the App, not
      # github-actions[bot]. GITHUB_TOKEN-created PRs do NOT trigger other
      # workflows (a deliberate GitHub loop-guard), so a bot PR opened with it
      # would never fire validate-pr / security and would sit un-mergeable. The
      # App token has no such restriction, so the PR gets its required checks.
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.CLAUSTODIAN_CI_CLIENT_ID }}
          private-key: ${{ secrets.CLAUSTODIAN_CI_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Keep the binary lane current automatically. The hourly detector passes the
      # new release version; download just that ONE release's compiled binary
      # (~250 MB from the CDN — not the 139 GB maintainer-local archive), verify it
      # against the release manifest, and extract it into the committed binary-cache/.
      # Non-fatal: a CDN hiccup must never block the authoritative changelog update —
      # the re-distill below then simply reproduces the existing evidence unchanged.
      - name: Scrape the new release's binary into the cache
        continue-on-error: true
        env:
          # Via env, never interpolated into the shell command — the input is
          # attacker-controllable (workflow_dispatch), so `${{ }}` in `run:` would
          # be a template-injection sink. scrape-binary also re-validates it as a
          # strict major.minor.patch. Empty (e.g. repository_dispatch) → index latest.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            npm run scrape-binary -- --version "$INPUT_VERSION"
          else
            npm run scrape-binary
          fi
      # Re-distill data/binary-observations.json + binary-descriptions.json from the
      # committed cache (no binaries needed). Runs every time so the evidence always
      # matches the cache, whether or not the scrape step above added a version.
      - name: Re-distill binary evidence from the cache
        run: npm run backfill-binary
      # Regenerate the docs lane from the official pages in this same run, so the
      # scrape enriches against freshly-fetched official docs — a hand-edited
      # committed data/docs.json can't reach the shipped dataset via this bot.
      - name: Refresh docs index from official pages
        run: npm run fetch-docs
      - name: Scrape changelog into data/
        run: npm run scrape -- --all
      - name: Validate regenerated data
        run: npm run validate
      # Blocking here: the dataset was just regenerated from the live changelog in
      # this run, so it must cover every changelog symbol. This is the drift gate
      # (moved off per-PR validate, where it wrongly failed unrelated PRs on any
      # upstream release).
      - name: Verify regenerated dataset covers the changelog
        run: npm run coverage
      # Surface the Claude Code version this run targets (latest.json is the
      # freshly regenerated snapshot) so it lands in the PR title / commit / squash.
      # `tr -d '\n'` strips the newline `node -p` prints, keeping GITHUB_OUTPUT's
      # `key=value` line well-formed even though $() also trims trailing newlines.
      - name: Read Claude Code version
        id: cc-version
        run: echo "version=$(node -p "require('./data/latest.json').claudeCodeVersion" | tr -d '\n')" >> "$GITHUB_OUTPUT"
      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: bot/changelog-update
          base: main
          title: 'chore(data): update dataset for Claude Code v${{ steps.cc-version.outputs.version }}'
          commit-message: 'chore(data): update dataset for Claude Code v${{ steps.cc-version.outputs.version }}'
          body: |
            Automated update from the official `CHANGELOG.md`
            (`provenance: changelog`, `confidence: high`).

            Latest Claude Code version in this run: **v${{ steps.cc-version.outputs.version }}**.

            Generated by `npm run scrape -- --all`. Review the diff before merge.
          labels: automated, changelog
