# Task 3.4 — Hourly trigger. Polls the GitHub Releases Atom feed (unauthenticated,
# not subject to the REST rate limit) for a new Claude Code version and, when the
# latest tag differs from data/index.json's `latest`, triggers the update workflow.
#
# NOTE: dispatching another workflow requires a PAT (secret DISPATCH_TOKEN) — the
# default GITHUB_TOKEN deliberately does NOT re-trigger workflows, so it cannot
# start update-from-changelog on its own. Create a fine-grained PAT with
# "Actions: write" on this repo and store it as the DISPATCH_TOKEN secret.
name: Check for new Claude Code release

on:
  schedule:
    - cron: '17 * * * *' # hourly at :17
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare latest release to tracked version
        id: compare
        run: |
          feed="https://github.com/anthropics/claude-code/releases.atom"
          latest_tag="$(curl -sSL "$feed" \
            | grep -oE 'releases/tag/v[0-9]+\.[0-9]+\.[0-9]+' \
            | head -1 | sed 's#releases/tag/v##')"
          current="$(jq -r '.latest' data/index.json)"
          echo "latest upstream: ${latest_tag:-<none>} | tracked: ${current:-<none>}"
          if [ -n "$latest_tag" ] && [ "$latest_tag" != "$current" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger update workflow
        if: steps.compare.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::New release detected but DISPATCH_TOKEN secret is not set; cannot trigger update-from-changelog."
            exit 1
          fi
          gh workflow run update-from-changelog.yml --repo "$GITHUB_REPOSITORY"
