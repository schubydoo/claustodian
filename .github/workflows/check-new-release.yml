# Task 3.4 — Hourly trigger. Polls the GitHub Releases Atom feed (unauthenticated,
# not subject to the REST rate limit) for a new Claude Code version and, when the
# latest tag differs from data/index.json's `latest`, triggers the update workflow.
#
# NOTE: dispatching another workflow requires a token other than GITHUB_TOKEN —
# the default token deliberately does NOT re-trigger workflows, so it cannot
# start update-from-changelog on its own. We mint a short-lived claustodian-ci
# App token with "Actions: write" for the dispatch (same App as the rest of CI),
# so no standalone PAT is needed.
name: Check for new Claude Code release

on:
  schedule:
    - cron: '17 * * * *' # hourly at :17
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Compare latest release to tracked version
        id: compare
        run: |
          feed="https://github.com/anthropics/claude-code/releases.atom"
          latest_tag="$(curl -sSL "$feed" \
            | grep -oE 'releases/tag/v[0-9]+\.[0-9]+\.[0-9]+' \
            | head -1 | sed 's#releases/tag/v##')"
          current="$(jq -r '.latest' data/index.json)"
          echo "latest upstream: ${latest_tag:-<none>} | tracked: ${current:-<none>}"
          if [ -n "$latest_tag" ] && [ "$latest_tag" != "$current" ]; then
            echo "new=true" >> "$GITHUB_OUTPUT"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Mint GitHub App token
        id: app-token
        if: steps.compare.outputs.new == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CLAUSTODIAN_CI_APP_ID }}
          private-key: ${{ secrets.CLAUSTODIAN_CI_APP_PRIVATE_KEY }}
          permission-actions: write
      - name: Trigger update workflow
        if: steps.compare.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::New release detected but the claustodian-ci App secrets are not set; cannot trigger update-from-changelog."
            exit 1
          fi
          gh workflow run update-from-changelog.yml --repo "$GITHUB_REPOSITORY"
