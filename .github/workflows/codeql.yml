# Durable code-scanning coverage bound to the PR branch's HEAD SHA.
#
# WHY THIS EXISTS — the "stuck PR" class
# The `main` ruleset's code_scanning rule blocks a PR until CodeQL has a current
# analysis mapped onto it. GitHub maps an `on: push` head-SHA analysis (this
# workflow) onto any open PR on that branch; the merge-commit analysis from the
# `pull_request` codeql job in security.yml is the other source. That merge-ref
# result (refs/pull/N/merge) is RECOMPUTED whenever main moves, but a base move
# fires no `pull_request` event, so it goes stale and the PR sticks at BLOCKED
# ("waiting for results from CodeQL …") even with every required check green.
# Binding a result to the branch's STABLE head SHA cures that.
#
# SCOPE / SAFETY
#   - Additive: security.yml's pull_request codeql job and the aggregator are
#     unchanged; this only adds head-SHA coverage.
#   - branches-ignore [main]: main's head SHA is already analysed by
#     security.yml's push:main codeql job, so exclude it here to avoid a
#     duplicate run. Tag pushes aren't matched by a branches filter, so releases
#     are untouched.
#   - push events are fork-safe (a fork pushes to its own repo). No secrets:
#     CodeQL uploads via the built-in GITHUB_TOKEN — App tokens are rejected by
#     upload-sarif (github/codeql-action#2719).
name: CodeQL (head SHA)

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: codeql analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload-sarif → code scanning (GITHUB_TOKEN only)
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: javascript-typescript
          build-mode: none
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: '/language:javascript-typescript'
